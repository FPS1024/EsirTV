<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EsirTV -  تەپسىلاتلىق</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body class="min-h-screen bg-slate-950 text-white">
  <main class="max-w-7xl mx-auto p-4 md:p-6">
    <div class="mb-4">
      <a id="backHome" href="./index.html" class="inline-flex items-center gap-2 bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-lg">
        <i class="fa-solid fa-arrow-left"></i>قايتىش
      </a>
    </div>

    <div id="errorBox" class="hidden mb-4 rounded-lg border border-rose-600/40 bg-rose-950/30 px-4 py-3 text-rose-200"></div>

    <section id="content" class="hidden">
      <div class="bg-black rounded-xl overflow-hidden mb-6">
        <video id="player" controls class="w-full max-h-[60vh] bg-black"></video>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2">
          <div class="flex items-start justify-between gap-3 mb-3">
            <h1 id="title" class="text-3xl font-bold"></h1>
            <button id="favoriteBtn" class="inline-flex items-center gap-2 rounded-lg border border-slate-700 bg-slate-900 px-3 py-2 text-sm hover:border-amber-400">
              <i class="fa-regular fa-star"></i>
              <span>ساقلاش</span>
            </button>
          </div>
          <p id="meta" class="text-slate-400 mb-4"></p>
          <div class="glass-effect rounded-xl p-5 mb-6">
            <h2 class="text-lg font-semibold mb-2">قىسقىچە تونۇشتۇرۇش</h2>
            <p id="desc" class="text-slate-300 leading-7"></p>
          </div>

          <h2 class="text-lg font-semibold mb-3">لىنىيە</h2>
          <div id="sources" class="flex flex-wrap gap-2 mb-6"></div>

          <h2 class="text-lg font-semibold mb-3">kisim</h2>
          <div id="episodes" class="flex flex-wrap gap-2"></div>
        </div>

        <aside>
          <div class="glass-effect rounded-xl p-5">
            <h2 class="text-lg font-semibold mb-2">ۋىدىئو ئۇچۇرى</h2>
            <p id="playInfo" class="text-slate-300 text-sm">چۈشەندۈرۈش</p>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <script src="./js/api.js"></script>
  <script src="./js/storage.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="./js/player.js"></script>
  <script src="./js/detail.js"></script>
</body>
</html>
