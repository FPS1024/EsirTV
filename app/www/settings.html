<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EsirTV - 设置</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body class="min-h-screen bg-slate-950 text-white">
  <main class="max-w-3xl mx-auto p-4 md:p-8">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl md:text-3xl font-bold">数据源设置</h1>
      <a href="./index.html" class="bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-lg text-sm">
        <i class="fa-solid fa-house"></i>
        返回首页
      </a>
    </div>

    <section class="glass-effect rounded-xl p-5 md:p-6">
      <label for="configUrl" class="block text-sm text-slate-300 mb-2">TVBox 配置链接</label>
      <input id="configUrl" type="text" placeholder="https://example.com/tvbox.json" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 mb-3">
      <p class="text-slate-400 text-sm mb-4">保存后首页会从该链接拉取站点列表。</p>

      <div class="flex items-center gap-3">
        <button id="saveBtn" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg">保存配置</button>
        <button id="verifyBtn" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg">保存并验证</button>
        <button id="testBtn" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg">仅测试链接</button>
      </div>

      <div id="msg" class="hidden mt-4 rounded-lg px-4 py-3 text-sm"></div>
      <pre id="detailMsg" class="hidden mt-3 rounded-lg bg-slate-900 border border-slate-700 px-4 py-3 text-xs text-slate-300 whitespace-pre-wrap break-all"></pre>
    </section>
  </main>

  <script src="./js/api.js"></script>
  <script src="./js/settings.js"></script>
</body>
</html>
